# Frontend container: serve the SPA. The host Nginx terminates TLS and routes
# /api/* to the backend container, so there is NO /api proxy here.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # hashed, content-addressed assets -> cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # never cache the shell, so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback for react-router deep links
    location / {
        try_files $uri $uri/ /index.html;
    }
}
